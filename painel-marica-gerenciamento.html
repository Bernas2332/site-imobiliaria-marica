<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Turíbio Imóveis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .card-admin { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: none; margin-bottom: 30px; }
        
        /* ZONA DE UPLOAD E PREVIEW */
        .upload-zone { border: 2px dashed #007bff; border-radius: 12px; padding: 25px; text-align: center; background: #f8f9fa; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { background: #eef6ff; }
        #container-previa { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .foto-wrapper { position: relative; width: 120px; background: #fff; padding: 5px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .foto-wrapper img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        .capa-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ffc107; color: #000; font-weight: bold; font-size: 10px; padding: 2px 8px; border-radius: 10px; z-index: 10; }
        .controles-foto { display: flex; justify-content: space-between; margin-top: 8px; }
        .btn-ctrl { padding: 2px 6px; font-size: 12px; }
        
        /* TABELA */
        .preview-img-tabela { width: 60px; height: 45px; object-fit: cover; border-radius: 4px; }
        .badge-tipo { font-size: 11px; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .bg-venda { background-color: #ffc107; color: #000; }
        .bg-locacao { background-color: #17a2b8; color: #fff; }

        /* ESTILOS DA TELA DE LOGIN */
        #telaLogin { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
        .box-login { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }

        /* ESTILOS DO FORMULÁRIO DE ATENDIMENTO */
        .container-atendimento {
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: none; margin-bottom: 30px;
        }
        .container-atendimento h2 {
            color: #000; text-transform: uppercase; font-weight: 800; margin-bottom: 25px; text-align: center;
        }
        .bloco-perfil {
            background: #f8f9fa; border-left: 4px solid #ffc107; padding: 20px; border-radius: 0 8px 8px 0; margin-top: 15px;
        }
        .bloco-perfil h4 {
            color: #333; margin-bottom: 15px; font-weight: bold;
        }

        /* =======================================================
           O SEGREDO DO PDF: REGRAS DE IMPRESSÃO
           ======================================================= */
        @media print {
            /* Esconde as outras partes do Admin na hora da impressão */
            #telaLogin, .card-admin, .btn, .d-flex.justify-content-end, .form-select { 
                display: none !important; 
            }
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            
            .container-atendimento { 
                box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; 
            }
            .container-atendimento h2 { 
                color: black !important; font-size: 22px !important; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 30px !important; 
            }
            .bloco-perfil { 
                display: block !important; background: none !important; border-left: 2px solid black !important; padding: 10px 0 10px 15px !important; 
            }
            .bloco-perfil h4 { 
                color: black !important; font-size: 16px !important; text-transform: uppercase; 
            }
            .form-control { 
                background: transparent !important; color: black !important; border: none !important; border-bottom: 1px dashed #666 !important; border-radius: 0 !important; padding: 2px 0 !important; box-shadow: none !important; resize: none !important;
            }
            label { color: black !important; font-weight: bold !important; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="box-login">
            <h2 class="fw-bold mb-2">Turíbio Imóveis</h2>
            <p class="text-muted mb-4">Painel Administrativo</p>
            
            <div class="input-group mb-3">
                <input type="password" id="inputSenha" class="form-control form-control-lg" placeholder="Digite a senha" onkeypress="verificarEnter(event)">
                <button class="btn btn-outline-secondary" type="button" id="btnToggleSenha" onclick="toggleSenha()">
                    👁️
                </button>
            </div>
            
            <button onclick="fazerLogin()" class="btn btn-dark btn-lg w-100">Entrar no Sistema</button>
        </div>
    </div>

    <div id="painelAdmin" class="container" style="display: none;">
        
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-outline-danger btn-sm" onclick="fazerLogout()">Sair do Sistema</button>
        </div>

        <div class="card-admin">
            <h2 class="fw-bold mb-4">Gerenciar Anúncio</h2>
            <form id="formImovel">
                <input type="hidden" id="idImovel" value="0">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Título</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tipo de Negócio</label>
                        <select id="tipo" class="form-select" required>
                            <option value="venda">Venda</option>
                            <option value="locacao">Locação</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" id="preco" class="form-control" required>
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label text-primary fw-bold">Prioridade de Exibição</label>
                        <select id="prioridade" class="form-select border-primary">
                            <option value="1">1 - Destaque (Topo do site)</option>
                            <option value="2" selected>2 - Normal (Meio do site)</option>
                            <option value="3">3 - Baixa (Fim da lista)</option>
                        </select>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Descrição</label>
                        <textarea id="descricao" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="col-12">
                        <div class="upload-zone" onclick="document.getElementById('fotoInput').click()">
                            <span class="fw-bold text-primary">+ Adicionar Fotos (A 1ª será a capa)</span>
                            <input type="file" id="fotoInput" hidden multiple accept="image/*" onchange="adicionarFotos(this.files)">
                        </div>
                        <div id="container-previa"></div>
                    </div>
                    <div class="col-12 text-end mt-3">
                        <div class="form-check d-inline-block me-4 text-start">
                            <input class="form-check-input" type="checkbox" id="ativo" checked>
                            <label class="form-check-label">Anúncio Ativo</label>
                        </div>
                        <button type="submit" id="btnSalvar" class="btn btn-primary btn-lg">Salvar Imóvel</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-admin">
            <h4 class="mb-3">Imóveis Atuais</h4>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Capa</th>
                        <th>Tipo</th>
                        <th>Título</th>
                        <th>Preço</th>
                        <th>Prioridade</th> <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <div class="container-atendimento">
            <h2>Formulário de Atendimento</h2>
            
            <form id="formAtendimento">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Data</label>
                        <input type="date" class="form-control" id="dataAtendimento" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Nome do Cliente</label>
                        <input type="text" class="form-control" id="nomeCliente" placeholder="Nome completo" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefones</label>
                        <input type="text" class="form-control" id="telefonesCliente" placeholder="(XX) XXXXX-XXXX" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Como soube de nossa empresa?</label>
                        <input type="text" class="form-control" id="comoSoube" placeholder="Ex: Instagram, Placa, Indicação...">
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Motivo da Visita / Telefonema</label>
                        <textarea class="form-control" id="motivoVisita" rows="2"></textarea>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-primary fw-bold">Perfil do Cliente (Selecione para abrir os campos):</label>
                    <select class="form-select border-primary" id="perfilCliente" onchange="alternarCamposPerfil()">
                        <option value="">-- Selecione o Perfil --</option>
                        <option value="comprador">Comprador (Quer comprar um Imóvel)</option>
                        <option value="vendedor">Vendedor (Quer colocar seu Imóvel para Vender)</option>
                        <option value="locador">Locador (Quer colocar seu Imóvel para Alugar)</option>
                        <option value="locatario">Locatário (Quer Alugar um Imóvel)</option>
                        <option value="contratante">Contratante (Legalização, Consultoria ou Assessoria Jurídica)</option>
                    </select>
                </div>

                <div id="bloco-comprador" class="bloco-perfil d-none">
                    <h4>Perfil: Comprador</h4>
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Tipo de Imóvel Desejado</label><input type="text" class="form-control" id="compTipo"></div>
                        <div class="col-md-4"><label class="form-label">Valor Disponível</label><input type="text" class="form-control" id="compValor"></div>
                        <div class="col-md-4"><label class="form-label">Forma de Pagamento</label><input type="text" class="form-control" id="compPagamento"></div>
                        <div class="col-md-4">
                            <label class="form-label">Tem FGTS?</label>
                            <select class="form-select" id="compFgts"><option value="Não">Não</option><option value="Sim">Sim</option></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tem Dependentes?</label>
                            <select class="form-select" id="compDependentes"><option value="Não">Não</option><option value="Sim">Sim</option></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Já tem imóvel financiado?</label>
                            <select class="form-select" id="compFinanciado"><option value="Não">Não</option><option value="Sim">Sim</option></select>
                        </div>
                        <div class="col-md-12"><label class="form-label">Outra Situação</label><input type="text" class="form-control" id="compOutraSituacao"></div>
                        <div class="col-md-6"><label class="form-label">Imóveis Oferecidos</label><textarea class="form-control" id="compImoveisOferecidos" rows="2"></textarea></div>
                        <div class="col-md-6"><label class="form-label">Status / Fechamento</label><textarea class="form-control" id="compStatus" rows="2"></textarea></div>
                    </div>
                </div>

                <div id="bloco-vendedor" class="bloco-perfil d-none">
                    <h4>Perfil: Vendedor</h4>
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Tipo de Imóvel</label><input type="text" class="form-control" id="vendTipo"></div>
                        <div class="col-md-4"><label class="form-label">Valor Desejado</label><input type="text" class="form-control" id="vendValorDesejado"></div>
                        <div class="col-md-4"><label class="form-label">Valor Avaliado pelo Corretor</label><input type="text" class="form-control" id="vendValorAvaliado"></div>
                        <div class="col-md-4"><label class="form-label">Documentação (Atual)</label><input type="text" class="form-control" id="vendDocumentacao"></div>
                        <div class="col-md-4">
                            <label class="form-label">Novo ou Usado?</label>
                            <select class="form-select" id="vendNovoUsado"><option value="Usado">Usado</option><option value="Novo">Novo</option></select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Forma de Pagamento</label><input type="text" class="form-control" id="vendPagamento"></div>
                        <div class="col-md-8"><label class="form-label">Endereço do Imóvel</label><input type="text" class="form-control" id="vendEndereco"></div>
                        <div class="col-md-4"><label class="form-label">Ponto de Referência</label><input type="text" class="form-control" id="vendReferencia"></div>
                        <div class="col-md-12"><label class="form-label">Pendências (Locatário, Documentação, Obras, etc.)</label><textarea class="form-control" id="vendPendencias" rows="2"></textarea></div>
                    </div>
                </div>

                <div id="bloco-locador" class="bloco-perfil d-none">
                    <h4>Perfil: Locador</h4>
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Tipo de Imóvel</label><input type="text" class="form-control" id="locadTipo"></div>
                        <div class="col-md-4"><label class="form-label">Valor Desejado</label><input type="text" class="form-control" id="locadValorDesejado"></div>
                        <div class="col-md-4"><label class="form-label">Valor Avaliado pelo Corretor</label><input type="text" class="form-control" id="locadValorAvaliado"></div>
                        <div class="col-md-6"><label class="form-label">Documentação (Atual)</label><input type="text" class="form-control" id="locadDocumentacao"></div>
                        <div class="col-md-6"><label class="form-label">Forma de Pagamento</label><input type="text" class="form-control" id="locadPagamento"></div>
                        <div class="col-md-8"><label class="form-label">Endereço do Imóvel</label><input type="text" class="form-control" id="locadEndereco"></div>
                        <div class="col-md-4"><label class="form-label">Ponto de Referência</label><input type="text" class="form-control" id="locadReferencia"></div>
                        <div class="col-md-12"><label class="form-label">Pendências (Locatário, Documentação, Obras, etc.)</label><textarea class="form-control" id="locadPendencias" rows="2"></textarea></div>
                    </div>
                </div>

                <div id="bloco-locatario" class="bloco-perfil d-none">
                    <h4>Perfil: Locatário</h4>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Tipo de Imóvel Desejado</label><input type="text" class="form-control" id="locatTipo"></div>
                        <div class="col-md-6"><label class="form-label">Valor da Locação</label><input type="text" class="form-control" id="locatValor"></div>
                        <div class="col-md-6"><label class="form-label">Imóveis Oferecidos</label><textarea class="form-control" id="locatImoveisOferecidos" rows="2"></textarea></div>
                        <div class="col-md-6"><label class="form-label">Status ou Fechamento</label><textarea class="form-control" id="locatStatus" rows="2"></textarea></div>
                    </div>
                </div>

                <div id="bloco-contratante" class="bloco-perfil d-none">
                    <h4>Perfil: Contratante (Serviços)</h4>
                    <div class="row g-3">
                        <div class="col-md-12"><label class="form-label">Tipo de Serviço Desejado</label><input type="text" class="form-control" id="contServico" placeholder="Legalização, Consultoria, Assessoria..."></div>
                        <div class="col-md-12"><label class="form-label">Detalhes do Serviço (Brevidade)</label><textarea class="form-control" id="contDetalhes" rows="3"></textarea></div>
                    </div>
                </div>

                <div class="mt-4 mb-4">
                    <label class="form-label">Observações Diversas</label>
                    <textarea class="form-control" id="obsDiversas" rows="3"></textarea>
                </div>

                <button type="button" class="btn btn-warning btn-lg w-100 fw-bold" onclick="imprimirFicha()">📄 GERAR FICHA EM PDF</button>
            </form>
        </div>
        </div>

    <script>
        const API = "https://api-imobiliaria-marica.onrender.com";
        const SENHA_CORRETA = "MaricaImoveis2026@!";
        
        let KEY = sessionStorage.getItem("adminKey") || "";

        // ==========================================
        // SISTEMA DE LOGIN E MOSTRAR SENHA
        // ==========================================
        function toggleSenha() {
            const input = document.getElementById('inputSenha');
            const btn = document.getElementById('btnToggleSenha');
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = '🙈';
            } else {
                input.type = 'password';
                btn.innerText = '👁️';
            }
        }

        function verificarEnter(event) {
            if (event.key === "Enter") fazerLogin();
        }

        function fazerLogin() {
            const digitada = document.getElementById('inputSenha').value;
            if (digitada === SENHA_CORRETA) {
                KEY = digitada;
                sessionStorage.setItem("adminKey", KEY);
                liberarAcesso();
            } else {
                alert("Senha incorreta!");
                document.getElementById('inputSenha').value = "";
            }
        }

        function fazerLogout() {
            sessionStorage.removeItem("adminKey");
            KEY = "";
            document.getElementById('painelAdmin').style.display = 'none';
            document.getElementById('telaLogin').style.display = 'flex';
            document.getElementById('inputSenha').value = "";
            document.getElementById('inputSenha').type = "password";
            document.getElementById('btnToggleSenha').innerText = "👁️";
        }

        function liberarAcesso() {
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('painelAdmin').style.display = 'block';
            listar(); 
        }

        if (KEY === SENHA_CORRETA) {
            liberarAcesso();
        }

        // ==========================================
        // LÓGICA DE FOTOS E COMPRESSÃO
        // ==========================================
        let listaArquivos = [];

        async function comprimirImagem(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1280;
                        let canvasWidth = img.width;
                        let canvasHeight = img.height;

                        if (img.width > MAX_WIDTH) {
                            const scaleSize = MAX_WIDTH / img.width;
                            canvasWidth = MAX_WIDTH;
                            canvasHeight = img.height * scaleSize;
                        }

                        canvas.width = canvasWidth;
                        canvas.height = canvasHeight;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            resolve(compressedFile);
                        }, 'image/jpeg', 0.7); 
                    };
                };
            });
        }

        async function adicionarFotos(files) {
            const formatosPermitidos = ['image/jpeg', 'image/png', 'image/webp'];
            const btn = document.getElementById('btnSalvar');
            
            btn.disabled = true;
            btn.innerText = "Processando fotos...";

            for (const f of Array.from(files)) {
                if (!formatosPermitidos.includes(f.type)) {
                    alert(`O arquivo ${f.name} não é uma imagem válida.`);
                    continue;
                }
                if (f.size > 1 * 1024 * 1024) {
                    const fotoComprimida = await comprimirImagem(f);
                    listaArquivos.push(fotoComprimida);
                } else {
                    listaArquivos.push(f);
                }
            }
            
            btn.disabled = false;
            btn.innerText = "Salvar Imóvel";
            document.getElementById('fotoInput').value = ""; 
            renderizar();
        }

        function mover(index, direcao) {
            const novaPos = index + direcao;
            if (novaPos >= 0 && novaPos < listaArquivos.length) {
                [listaArquivos[index], listaArquivos[novaPos]] = [listaArquivos[novaPos], listaArquivos[index]];
                renderizar();
            }
        }

        function remover(index) {
            listaArquivos.splice(index, 1);
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('container-previa');
            container.innerHTML = "";
            listaArquivos.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'foto-wrapper';
                    div.innerHTML = `
                        ${index === 0 ? '<span class="capa-badge">CAPA</span>' : ''}
                        <img src="${e.target.result}">
                        <div class="controles-foto">
                            <button type="button" class="btn btn-sm btn-outline-secondary btn-ctrl" onclick="mover(${index}, -1)">←</button>
                            <button type="button" class="btn btn-sm btn-danger btn-ctrl" onclick="remover(${index})">×</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary btn-ctrl" onclick="mover(${index}, 1)">→</button>
                        </div>
                    `;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // COMUNICAÇÃO COM O C# (API)
        // ==========================================
        document.getElementById('formImovel').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append("idImovel", document.getElementById('idImovel').value);
            fd.append("titulo", document.getElementById('titulo').value);
            fd.append("tipo", document.getElementById('tipo').value);
            fd.append("preco", document.getElementById('preco').value);
            fd.append("descricao", document.getElementById('descricao').value);
            fd.append("ativo", document.getElementById('ativo').checked);
            
            // NOVO: Adicionando a Prioridade no envio
            fd.append("prioridade", document.getElementById('prioridade').value);
            
            listaArquivos.forEach(f => fd.append("fotos", f));

            try {
                const res = await fetch(`${API}/imoveis/salvar-imovel`, {
                    method: 'POST', headers: { 'X-Api-Key': KEY }, body: fd
                });
                if(res.ok) {
                    alert("Sucesso!");
                    location.reload();
                } else {
                    alert("Erro ao salvar no servidor.");
                    btn.innerText = "Salvar Imóvel";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Erro de conexão.");
                btn.innerText = "Salvar Imóvel";
                btn.disabled = false;
            }
        };

        async function listar() {
            try {
                const res = await fetch(`${API}/imoveis/admin-lista`);
                const dados = await res.json();
                
                document.getElementById('corpoTabela').innerHTML = dados.map(i => {
                    const tipoImovel = (i.tipo || 'venda').toLowerCase();
                    const badgeClass = tipoImovel === 'locacao' ? 'bg-locacao' : 'bg-venda';
                    
                    // NOVO: Renderizando a bolinha de prioridade
                    let badgePrioridade = "bg-secondary";
                    if(i.prioridade == 1) badgePrioridade = "bg-success";
                    if(i.prioridade == 3) badgePrioridade = "bg-danger";
                    
                    return `
                    <tr>
                        <td><img src="${i.fotos ? i.fotos.split(',')[0] : 'https://picsum.photos/seed/imovel/100'}" class="preview-img-tabela"></td>
                        <td><span class="badge-tipo ${badgeClass}">${tipoImovel}</span></td>
                        <td>${i.titulo}</td>
                        <td>R$ ${i.preco.toLocaleString('pt-br')}</td>
                        <td><span class="badge ${badgePrioridade}">Nível ${i.prioridade || 2}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning me-1" onclick="prepararEdicao(${JSON.stringify(i).replace(/"/g, '&quot;')})">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="deletar(${i.id})">Excluir</button>
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch(e) { console.error("Erro ao listar imóveis", e); }
        }

        function prepararEdicao(i) {
            document.getElementById('idImovel').value = i.id;
            document.getElementById('titulo').value = i.titulo;
            document.getElementById('tipo').value = i.tipo ? i.tipo.toLowerCase() : 'venda';
            document.getElementById('preco').value = i.preco;
            document.getElementById('descricao').value = i.descricao;
            document.getElementById('ativo').checked = i.ativo;
            
            // NOVO: Preenchendo a prioridade ao clicar em Editar
            document.getElementById('prioridade').value = i.prioridade || 2;
            
            listaArquivos = [];
            document.getElementById('container-previa').innerHTML = '<p class="text-info w-100 text-center mt-2">Ao adicionar novas fotos, as antigas serão substituídas no servidor.</p>';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deletar(id) {
            if(confirm("Tem certeza que deseja excluir este imóvel permanentemente?")) {
                await fetch(`${API}/imoveis/deletar-imovel/${id}`, { 
                    method: 'DELETE', headers: { 'X-Api-Key': KEY } 
                });
                listar();
            }
        }

        // ==========================================
        // LÓGICA DA FICHA DE ATENDIMENTO
        // ==========================================
        function alternarCamposPerfil() {
            const perfil = document.getElementById('perfilCliente').value;
            
            document.querySelectorAll('.bloco-perfil').forEach(bloco => {
                bloco.classList.add('d-none');
            });

            if (perfil) {
                document.getElementById(`bloco-${perfil}`).classList.remove('d-none');
            }
        }

        function imprimirFicha() {
            if (!document.getElementById('nomeCliente').value || !document.getElementById('dataAtendimento').value) {
                alert("Por favor, preencha ao menos a Data e o Nome do Cliente antes de gerar o PDF.");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
