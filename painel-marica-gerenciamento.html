<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin Premium - Turíbio Imóveis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .card-admin { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: none; }
        
        /* ÁREA DE DRAG AND DROP */
        #drop-zone {
            border: 2px dashed #007bff;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background: #f8f9fa;
            color: #007bff;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        #drop-zone.highlight { background: #e1ecf7; border-color: #0056b3; }

        #container-previa { 
            display: flex; flex-wrap: wrap; gap: 15px; 
            padding: 15px; background: #fff; border-radius: 10px; min-height: 50px;
        }
        .preview-wrapper {
            position: relative; display: flex; flex-direction: column; align-items: center;
        }
        .mini-previa { 
            width: 100px; height: 100px; object-fit: cover; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 2px solid #fff;
        }
        .btn-remove {
            position: absolute; top: -5px; right: -5px; background: #ff4757;
            color: white; border: none; border-radius: 50%; width: 22px; height: 22px;
            font-size: 12px; cursor: pointer; font-weight: bold;
        }
        .badge-ordem { margin-top: 5px; font-size: 12px; font-weight: bold; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-admin mb-4">
            <h2 class="fw-bold">Gerenciador de Imóveis</h2>
            <hr>
            <form id="formImovel">
                <input type="hidden" id="idImovel" value="0">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Título do Anúncio</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" id="preco" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea id="descricao" class="form-control" rows="2" required></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Fotos do Imóvel (A primeira será a capa)</label>
                        <div id="drop-zone">
                            Arraste as fotos aqui ou clique para selecionar
                            <input type="file" id="fotoInput" multiple accept="image/*" style="display:none">
                        </div>
                        <div id="container-previa"></div>
                    </div>

                    <div class="col-md-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="ativo" checked>
                            <label class="form-check-label">Imóvel Ativo</label>
                        </div>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Salvar Imóvel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = "https://api-imobiliaria-marica.onrender.com";
        const KEY = "MaricaImoveis2026@!";
        let filaDeArquivos = [];

        const dropZone = document.getElementById('drop-zone');
        const fotoInput = document.getElementById('fotoInput');
        const container = document.getElementById('container-previa');

        // Abre o seletor de arquivos ao clicar na zona
        dropZone.onclick = () => fotoInput.click();

        // Gerencia os arquivos selecionados/arrastados
        fotoInput.onchange = (e) => adicionarArquivos(e.target.files);
        
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('highlight'); };
        dropZone.ondragleave = () => dropZone.classList.remove('highlight');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('highlight');
            adicionarArquivos(e.dataTransfer.files);
        };

        function adicionarArquivos(files) {
            Array.from(files).forEach(file => {
                filaDeArquivos.push(file); // Adiciona ao final da fila (mantém ordem)
            });
            renderizarPrevia();
        }

        function removerArquivo(index) {
            filaDeArquivos.splice(index, 1);
            renderizarPrevia();
        }

        function renderizarPrevia() {
            container.innerHTML = filaDeArquivos.length ? "" : '<small class="text-muted">Nenhuma imagem selecionada</small>';
            
            filaDeArquivos.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'preview-wrapper';
                    wrap.innerHTML = `
                        <button type="button" class="btn-remove" onclick="removerArquivo(${index})">X</button>
                        <img src="${e.target.result}" class="mini-previa">
                        <span class="badge-ordem">${index === 0 ? 'CAPA' : (index + 1) + 'º'}</span>
                    `;
                    container.appendChild(wrap);
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('formImovel').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;

            const fd = new FormData();
            fd.append("idImovel", document.getElementById('idImovel').value);
            fd.append("titulo", document.getElementById('titulo').value);
            fd.append("preco", document.getElementById('preco').value);
            fd.append("descricao", document.getElementById('descricao').value);
            fd.append("ativo", document.getElementById('ativo').checked);
            
            // Envia na ordem da fila
            filaDeArquivos.forEach(f => fd.append("fotos", f));

            try {
                const res = await fetch(`${API}/imoveis/salvar-imovel`, {
                    method: 'POST',
                    headers: { 'X-Api-Key': KEY },
                    body: fd
                });
                if(res.ok) { alert("Sucesso!"); location.reload(); }
            } catch (err) { alert("Erro de conexão."); btn.disabled = false; }
        };
    </script>
</body>
</html>
