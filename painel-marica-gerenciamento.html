<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Turíbio Imóveis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 900px; margin-top: 30px; }
        .card { padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .img-preview { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gerenciar Imóveis</h2>
            <a href="index.html" class="btn btn-outline-secondary">Ver Vitrine</a>
        </div>

        <div class="card mb-5">
            <h4>Cadastrar / Editar Imóvel</h4>
            <form id="formImovel">
                <input type="hidden" id="idImovel" value="0">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Título do Anúncio</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" id="preco" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição Detalhada</label>
                        <textarea id="descricao" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Fotos (Selecione uma ou várias)</label>
                        <input type="file" id="fotos" class="form-control" accept="image/*" multiple>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="ativo" checked>
                            <label class="form-check-label">Imóvel Ativo</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100">Salvar Imóvel</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <h4>Imóveis Cadastrados</h4>
            <table class="table table-hover mt-3">
                <thead>
                    <tr>
                        <th>Capa</th>
                        <th>Título</th>
                        <th>Preço</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaImoveis"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://api-imobiliaria-marica.onrender.com";
        const API_KEY = "MaricaImoveis2026@!";

        async function carregarImoveis() {
            const res = await fetch(`${API_URL}/imoveis/admin-lista`);
            const imoveis = await res.json();
            const lista = document.getElementById("tabelaImoveis");
            lista.innerHTML = "";

            imoveis.forEach(imovel => {
                // Lógica para pegar a primeira foto da string para a miniatura
                const primeiraFoto = imovel.fotos ? imovel.fotos.split(',')[0] : 'https://via.placeholder.com/150';
                
                lista.innerHTML += `
                    <tr>
                        <td><img src="${primeiraFoto}" class="img-preview"></td>
                        <td>${imovel.titulo}</td>
                        <td>R$ ${imovel.preco.toLocaleString('pt-BR')}</td>
                        <td><span class="badge ${imovel.ativo ? 'bg-success' : 'bg-danger'}">${imovel.ativo ? 'Ativo' : 'Inativo'}</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editar('${imovel.id}', '${imovel.titulo}', ${imovel.preco}, '${imovel.descricao}', ${imovel.ativo})">Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="deletar(${imovel.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("formImovel").onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append("idImovel", document.getElementById("idImovel").value);
            formData.append("titulo", document.getElementById("titulo").value);
            formData.append("preco", document.getElementById("preco").value);
            formData.append("descricao", document.getElementById("descricao").value);
            formData.append("ativo", document.getElementById("ativo").checked);

            const inputFotos = document.getElementById("fotos");
            // Adiciona todas as fotos selecionadas ao FormData
            for (let i = 0; i < inputFotos.files.length; i++) {
                formData.append("fotos", inputFotos.files[i]);
            }

            const res = await fetch(`${API_URL}/imoveis/salvar-imovel`, {
                method: "POST",
                headers: { "X-Api-Key": API_KEY },
                body: formData
            });

            if (res.ok) {
                alert("Sucesso!");
                location.reload();
            } else {
                alert("Erro ao salvar.");
            }
        };

        function editar(id, titulo, preco, descricao, ativo) {
            document.getElementById("idImovel").value = id;
            document.getElementById("titulo").value = titulo;
            document.getElementById("preco").value = preco;
            document.getElementById("descricao").value = descricao;
            document.getElementById("ativo").checked = ativo;
            window.scrollTo(0,0);
        }

        async function deletar(id) {
            if (confirm("Deseja excluir este imóvel?")) {
                await fetch(`${API_URL}/imoveis/deletar-imovel/${id}`, {
                    method: "DELETE",
                    headers: { "X-Api-Key": API_KEY }
                });
                carregarImoveis();
            }
        }

        carregarImoveis();
    </script>
</body>
</html>
