<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Turíbio Imóveis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding: 40px 0; font-family: 'Segoe UI', sans-serif; }
        .card-admin { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: none; }
        .preview-img-tabela { width: 60px; height: 45px; object-fit: cover; border-radius: 5px; }
        
        /* ÁREA DE SELEÇÃO */
        .upload-box {
            border: 2px solid #dee2e6;
            padding: 20px;
            border-radius: 10px;
            background: #fff;
            text-align: center;
        }

        #container-previa { 
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; 
            min-height: 50px;
        }
        .preview-wrapper { position: relative; }
        .mini-previa { width: 85px; height: 85px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        
        .btn-remover {
            position: absolute; top: -5px; right: -5px; background: #dc3545;
            color: white; border: none; border-radius: 50%; width: 20px; height: 20px;
            font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .badge-posicao {
            position: absolute; bottom: 0; left: 0; background: rgba(0,0,0,0.6);
            color: white; font-size: 10px; padding: 2px 5px; border-bottom-left-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-admin mb-4">
            <h2 class="fw-bold mb-4">Gerenciar Imóvel</h2>
            <form id="formImovel">
                <input type="hidden" id="idImovel" value="0">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Título</label>
                        <input type="text" id="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Preço (R$)</label>
                        <input type="number" id="preco" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Descrição</label>
                        <textarea id="descricao" class="form-control" rows="2" required></textarea>
                    </div>
                    
                    <div class="col-12">
                        <div class="upload-box">
                            <label class="form-label d-block fw-bold">Adicionar Fotos (A ordem de seleção será mantida)</label>
                            <input type="file" id="fotoInput" class="form-control" multiple accept="image/*" onchange="adicionarAosAtuais(this)">
                            <div id="container-previa"></div>
                        </div>
                    </div>

                    <div class="col-md-6 d-flex align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="ativo" checked>
                            <label class="form-check-label">Imóvel Ativo</label>
                        </div>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Salvar Imóvel</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-admin">
            <h4 class="mb-4">Imóveis no Sistema</h4>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Capa</th>
                        <th>Título</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://api-imobiliaria-marica.onrender.com";
        const KEY = "MaricaImoveis2026@!";
        
        // --- A MÁGICA ESTÁ AQUI: O ARRAY QUE GUARDA A ORDEM ---
        let listaDeFotos = [];

        function adicionarAosAtuais(input) {
            const novosArquivos = Array.from(input.files);
            
            // Adiciona os novos arquivos ao final da lista já existente
            novosArquivos.forEach(file => {
                listaDeFotos.push(file);
            });

            // Limpa o input para ele poder selecionar os mesmos arquivos de novo se quiser
            input.value = "";
            
            renderizarPrevia();
        }

        function removerDaLista(index) {
            listaDeFotos.splice(index, 1);
            renderizarPrevia();
        }

        function renderizarPrevia() {
            const container = document.getElementById('container-previa');
            container.innerHTML = "";

            listaDeFotos.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'preview-wrapper';
                    wrap.innerHTML = `
                        <button type="button" class="btn-remover" onclick="removerDaLista(${index})">×</button>
                        <img src="${e.target.result}" class="mini-previa">
                        <span class="badge-posicao">${index + 1}º</span>
                    `;
                    container.appendChild(wrap);
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('formImovel').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;

            const fd = new FormData();
            fd.append("idImovel", document.getElementById('idImovel').value);
            fd.append("titulo", document.getElementById('titulo').value);
            fd.append("preco", document.getElementById('preco').value);
            fd.append("descricao", document.getElementById('descricao').value);
            fd.append("ativo", document.getElementById('ativo').checked);
            
            // Envia na ordem exata que as fotos aparecem na prévia
            listaDeFotos.forEach(f => fd.append("fotos", f));

            try {
                const res = await fetch(`${API}/imoveis/salvar-imovel`, {
                    method: 'POST',
                    headers: { 'X-Api-Key': KEY },
                    body: fd
                });
                if(res.ok) { alert("Imóvel salvo!"); location.reload(); }
                else { alert("Erro ao salvar."); btn.disabled = false; }
            } catch (err) { alert("Erro de conexão."); btn.disabled = false; }
        };

        // --- FUNÇÕES DE LISTAGEM ---
        async function listar() {
            const res = await fetch(`${API}/imoveis/admin-lista`);
            const imoveis = await res.json();
            document.getElementById('corpoTabela').innerHTML = imoveis.map(i => `
                <tr>
                    <td><img src="${i.fotos ? i.fotos.split(',')[0] : ''}" class="preview-img-tabela"></td>
                    <td>${i.titulo}</td>
                    <td>R$ ${i.preco.toLocaleString('pt-br')}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="prepararEdicao(${JSON.stringify(i).replace(/"/g, '&quot;')})">Editar</button>
                        <button class="btn btn-sm btn-danger" onclick="deletar(${i.id})">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        function prepararEdicao(i) {
            document.getElementById('idImovel').value = i.id;
            document.getElementById('titulo').value = i.titulo;
            document.getElementById('preco').value = i.preco;
            document.getElementById('descricao').value = i.descricao;
            document.getElementById('ativo').checked = i.ativo;
            listaDeFotos = []; 
            document.getElementById('container-previa').innerHTML = '<small class="text-info">Novas fotos substituirão as antigas.</small>';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deletar(id) {
            if(confirm("Excluir imóvel?")) {
                await fetch(`${API}/imoveis/deletar-imovel/${id}`, { method: 'DELETE', headers: { 'X-Api-Key': KEY } });
                listar();
            }
        }
        listar();
    </script>
</body>
</html>
