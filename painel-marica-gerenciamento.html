<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Turíbio Imóveis</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .form-container { background: white; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* ESTILO DA PREVIA COM ORDENAÇÃO */
        #container-previa { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .preview-item { position: relative; width: 100px; height: 100px; }
        .mini-previa { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; border: 1px solid #ccc; }
        
        .input-ordem {
            position: absolute; top: -8px; left: -8px; width: 28px; height: 28px;
            text-align: center; background: #2c3e50; color: white;
            border: 2px solid white; border-radius: 50%; font-weight: bold; font-size: 14px;
        }
        
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Gerenciar Imóvel</h2>
    <form id="formImovel">
        <input type="hidden" id="idImovel" value="0">
        <label>Título do Imóvel:</label>
        <input type="text" id="titulo" required placeholder="Ex: Casa em Itaipuaçu">
        
        <label>Preço (R$):</label>
        <input type="number" id="preco" required placeholder="Ex: 450000">
        
        <label>Descrição:</label>
        <textarea id="descricao" rows="4" placeholder="Detalhes do imóvel..."></textarea>
        
        <label>Fotos (Selecione todas de uma vez):</label>
        <input type="file" id="fotos" multiple accept="image/*" onchange="mostrarPrevia(this)">
        
        <div id="container-previa"></div>

        <label style="display: block; margin-top: 15px;">
            <input type="checkbox" id="ativo" checked style="width: auto;"> Imóvel Ativo
        </label>
        
        <button type="submit">SALVAR IMÓVEL</button>
    </form>
</div>

<script>
    const API = "https://api-imobiliaria-marica.onrender.com";
    const KEY = "sua_chave_aqui"; // Coloque sua chave de API aqui
    let arquivosOriginais = [];

    function mostrarPrevia(input) {
        const container = document.getElementById('container-previa');
        container.innerHTML = "";
        arquivosOriginais = Array.from(input.files);

        arquivosOriginais.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <input type="number" class="input-ordem" value="${index + 1}" data-id="${index}">
                    <img src="${e.target.result}" class="mini-previa">
                `;
                container.appendChild(div);
            }
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('formImovel').onsubmit = async (e) => {
        e.preventDefault();
        
        const inputsOrdem = document.querySelectorAll('.input-ordem');
        let listaOrdenada = [];

        // Lógica CC: Mapeia os arquivos para as novas posições
        inputsOrdem.forEach(input => {
            const novaPosicao = parseInt(input.value) - 1;
            const indexOriginal = input.dataset.id;
            listaOrdenada[novaPosicao] = arquivosOriginais[indexOriginal];
        });

        // Remove buracos se o usuário pular números
        const arquivosParaEnvio = listaOrdenada.filter(f => f !== undefined);

        const fd = new FormData();
        fd.append("idImovel", document.getElementById('idImovel').value);
        fd.append("titulo", document.getElementById('titulo').value);
        fd.append("preco", document.getElementById('preco').value);
        fd.append("descricao", document.getElementById('descricao').value);
        fd.append("ativo", document.getElementById('ativo').checked);
        
        // Adiciona fotos na ordem correta
        arquivosParaEnvio.forEach(f => fd.append("fotos", f));

        try {
            const res = await fetch(`${API}/imoveis/salvar-imovel`, {
                method: 'POST',
                headers: { 'X-Api-Key': KEY },
                body: fd
            });
            if(res.ok) {
                alert("Imóvel salvo com a ordem de fotos atualizada!");
                location.reload();
            } else {
                alert("Erro ao salvar.");
            }
        } catch (err) {
            alert("Erro de conexão com o servidor.");
        }
    };
</script>
</body>
</html>
