<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Turíbio Imóveis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7f6; padding: 40px 0; }
        .card-admin { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .preview-img { width: 60px; height: 45px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-admin mb-4">
            <div class="d-flex justify-content-between">
                <h2>Gerenciador de Imóveis</h2>
                <a href="index.html" class="btn btn-outline-dark">Voltar ao Site</a>
            </div>
            <hr>
            <form id="formImovel">
                <input type="hidden" id="idImovel" value="0">
                <div class="row g-3">
                    <div class="col-md-8"><label>Título</label><input type="text" id="titulo" class="form-control" required></div>
                    <div class="col-md-4"><label>Preço</label><input type="number" id="preco" class="form-control" required></div>
                    <div class="col-12"><label>Descrição</label><textarea id="descricao" class="form-control" rows="2" required></textarea></div>
                    <div class="col-md-9"><label>Fotos (Pode selecionar várias)</label><input type="file" id="fotoInput" class="form-control" multiple accept="image/*"></div>
                    <div class="col-md-3 d-flex align-items-end"><div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="ativo" checked><label>Ativo</label></div></div>
                    <button type="submit" class="btn btn-primary btn-lg mt-4">Salvar Imóvel</button>
                </div>
            </form>
        </div>

        <div class="card-admin">
            <table class="table align-middle">
                <thead><tr><th>Capa</th><th>Título</th><th>Preço</th><th>Ações</th></tr></thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://api-imobiliaria-marica.onrender.com";
        const KEY = "MaricaImoveis2026@!";

        async function listar() {
            const res = await fetch(`${API}/imoveis/admin-lista`);
            const imoveis = await res.json();
            document.getElementById('corpoTabela').innerHTML = imoveis.map(i => `
                <tr>
                    <td><img src="${i.fotos ? i.fotos.split(',')[0] : ''}" class="preview-img"></td>
                    <td>${i.titulo}</td>
                    <td>R$ ${i.preco.toLocaleString('pt-br')}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="prepararEdicao(${JSON.stringify(i).replace(/"/g, '&quot;')})">Editar</button>
                        <button class="btn btn-sm btn-danger" onclick="deletar(${i.id})">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('formImovel').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append("idImovel", document.getElementById('idImovel').value);
            fd.append("titulo", document.getElementById('titulo').value);
            fd.append("preco", document.getElementById('preco').value);
            fd.append("descricao", document.getElementById('descricao').value);
            fd.append("ativo", document.getElementById('ativo').checked);
            
            const files = document.getElementById('fotoInput').files;
            for(let f of files) fd.append("fotos", f);

            const res = await fetch(`${API}/imoveis/salvar-imovel`, {
                method: 'POST', headers: { 'X-Api-Key': KEY }, body: fd
            });
            if(res.ok) location.reload(); else alert("Erro ao salvar");
        };

        function prepararEdicao(i) {
            document.getElementById('idImovel').value = i.id;
            document.getElementById('titulo').value = i.titulo;
            document.getElementById('preco').value = i.preco;
            document.getElementById('descricao').value = i.descricao;
            document.getElementById('ativo').checked = i.ativo;
            window.scrollTo(0,0);
        }

        async function deletar(id) {
            if(confirm("Excluir?")) {
                await fetch(`${API}/imoveis/deletar-imovel/${id}`, { method: 'DELETE', headers: { 'X-Api-Key': KEY } });
                listar();
            }
        }
        listar();
    </script>
</body>
</html>
