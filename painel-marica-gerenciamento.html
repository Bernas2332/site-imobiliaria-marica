<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Turíbio Imóveis</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 100px; resize: none; }
        .status-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; align-items: center; gap: 10px; }
        .btn-main { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-del { width: 100%; padding: 10px; background: #fff; color: #d93025; border: 1px solid #d93025; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; display: none; }
        #msg { margin-top: 20px; text-align: center; padding: 10px; border-radius: 8px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="index.html" style="font-size: 13px; color: #1a73e8; text-decoration: none;">← Ver Vitrine Pública</a>
    </div>
    <h2>Gerenciar Imóveis</h2>

    <label>Selecione uma ação:</label>
    <select id="seletor" onchange="carregarDadosNoForm()">
        <option value="0">--- CADASTRAR NOVO IMÓVEL ---</option>
    </select>

    <hr>

    <input type="hidden" id="idImovel" value="0">
    
    <label>Título:</label>
    <input type="text" id="tit">

    <label>Preço (R$):</label>
    <input type="number" step="0.01" id="val">

    <label>Descrição:</label>
    <textarea id="desc"></textarea>

    <div class="status-box">
        <input type="checkbox" id="ativo" checked>
        <span>Exibir no site</span>
    </div>

    <label>Foto:</label>
    <input type="file" id="img" accept="image/*">

    <button class="btn-main" onclick="salvar()">Salvar no Banco</button>
    <button class="btn-del" id="btnExcluir" onclick="deletar()">Excluir</button>
    
    <div id="msg"></div>
</div>

<script>
    const API_URL = 'https://api-imobiliaria-marica.onrender.com';
    const API_KEY = 'MaricaImoveis2026@!';
    let imoveisMemoria = [];

    async function atualizarLista() {
        try {
            const res = await fetch(`${API_URL}/imoveis/admin-lista`);
            imoveisMemoria = await res.json();
            const seletor = document.getElementById('seletor');
            seletor.innerHTML = '<option value="0">--- CADASTRAR NOVO IMÓVEL ---</option>';
            imoveisMemoria.forEach(i => {
                const option = document.createElement('option');
                option.value = i.id;
                option.textContent = i.titulo;
                seletor.appendChild(option);
            });
        } catch (e) { console.error(e); }
    }

    function carregarDadosNoForm() {
        const idSel = document.getElementById('seletor').value;
        const btnDel = document.getElementById('btnExcluir');
        
        if (idSel === "0") {
            // RESET ABSOLUTO
            document.getElementById('idImovel').value = 0;
            document.getElementById('tit').value = "";
            document.getElementById('val').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('img').value = "";
            btnDel.style.display = "none";
        } else {
            const imovel = imoveisMemoria.find(x => x.id == idSel);
            if (imovel) {
                document.getElementById('idImovel').value = imovel.id;
                document.getElementById('tit').value = imovel.titulo;
                document.getElementById('val').value = imovel.preco;
                document.getElementById('desc').value = imovel.descricao;
                btnDel.style.display = "block";
            }
        }
    }

    async function salvar() {
        const msg = document.getElementById('msg');
        const fd = new FormData();
        
        // TRAVA DE SEGURANÇA: Garante que o ID vá como número
        const idParaEnviar = parseInt(document.getElementById('idImovel').value) || 0;
        
        fd.append('idImovel', idParaEnviar);
        fd.append('titulo', document.getElementById('tit').value);
        fd.append('preco', document.getElementById('val').value);
        fd.append('descricao', document.getElementById('desc').value);
        fd.append('ativo', document.getElementById('ativo').checked);
        
        const file = document.getElementById('img').files[0];
        if(file) fd.append('arquivo', file);

        msg.style.display = 'block';
        msg.innerText = "Enviando...";

        try {
            const res = await fetch(`${API_URL}/imoveis/salvar-imovel`, {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: fd
            });

            if(res.ok) {
                msg.innerText = "✅ Salvo!";
                msg.style.background = "#d4edda";
                
                // RESET PÓS-SALVAMENTO
                document.getElementById('seletor').value = "0";
                carregarDadosNoForm();
                await atualizarLista();
            } else { throw new Error(); }
        } catch (e) {
            msg.innerText = "❌ Erro.";
            msg.style.background = "#f8d7da";
        }
    }

    async function deletar() {
        const id = document.getElementById('idImovel').value;
        if(id == "0" || !confirm("Apagar?")) return;
        try {
            const res = await fetch(`${API_URL}/imoveis/deletar-imovel/${id}`, {
                method: 'DELETE',
                headers: { 'X-Api-Key': API_KEY }
            });
            if(res.ok) { window.location.reload(); }
        } catch (e) { alert("Erro"); }
    }

    atualizarLista();
</script>
</body>
</html>
