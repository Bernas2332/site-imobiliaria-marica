<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Maricá Imóveis</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        select, input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 100px; resize: none; }
        .status-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; align-items: center; gap: 10px; }
        .btn-main { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { background: #1557b0; }
        .btn-del { width: 100%; padding: 10px; background: #fff; color: #d93025; border: 1px solid #d93025; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; display: none; }
        #msg { margin-top: 20px; text-align: center; padding: 10px; border-radius: 8px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerenciar Imóveis</h2>

    <label>1. Selecione para editar ou criar novo:</label>
    <select id="seletor" onchange="carregarDadosNoForm()">
        <option value="0">--- CADASTRAR NOVO IMÓVEL ---</option>
    </select>

    <hr>

    <input type="hidden" id="id" value="0">
    
    <label>Título do Anúncio:</label>
    <input type="text" id="tit" placeholder="Ex: Casa Duplex em Maricá">

    <label>Preço (R$):</label>
    <input type="number" step="0.01" id="val" placeholder="Ex: 550000.00">

    <label>Descrição Detalhada:</label>
    <textarea id="desc" placeholder="Descreva os cômodos, localização, etc..."></textarea>

    <div class="status-box">
        <input type="checkbox" id="ativo" checked style="width: auto; cursor: pointer;">
        <span style="cursor: pointer;" onclick="document.getElementById('ativo').click()">Exibir no site (Público)</span>
    </div>

    <label>Foto do Imóvel (Deixe vazio para manter a atual):</label>
    <input type="file" id="img" accept="image/*">

    <button class="btn-main" onclick="salvar()">Salvar no Banco de Dados</button>
    <button class="btn-del" id="btnExcluir" onclick="deletar()">Excluir Imóvel para Sempre</button>
    
    <div id="msg"></div>
</div>

<script>
    const API_URL = 'https://api-imobiliaria-marica.onrender.com';
    const API_KEY = 'MaricaImoveis2026@!';
    let imoveisMemoria = [];

    // Busca a lista mastigada pelo C# (Rota corrigida com /imoveis)
    async function atualizarLista() {
        try {
            const res = await fetch(`${API_URL}/imoveis/admin-lista`);
            if (!res.ok) throw new Error("Erro ao buscar dados da API");
            
            imoveisMemoria = await res.json();
            
            const seletor = document.getElementById('seletor');
            seletor.innerHTML = '<option value="0">--- CADASTRAR NOVO IMÓVEL ---</option>';
            
            imoveisMemoria.forEach(i => {
                const status = i.ativo ? "" : " [ESCONDIDO]";
                const option = document.createElement('option');
                option.value = i.id;
                option.textContent = `${i.titulo}${status}`;
                seletor.appendChild(option);
            });
        } catch (e) {
            console.error("Erro na lista:", e);
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            msg.innerText = "⚠️ Erro ao conectar com a API no Render.";
            msg.style.background = "#fff3cd";
            msg.style.color = "#856404";
        }
    }

    function carregarDadosNoForm() {
        const idSel = document.getElementById('seletor').value;
        const btnDel = document.getElementById('btnExcluir');
        const msg = document.getElementById('msg');
        msg.style.display = 'none';

        if (idSel == "0") {
            document.getElementById('id').value = 0;
            document.getElementById('tit').value = "";
            document.getElementById('val').value = "";
            document.getElementById('desc').value = "";
            document.getElementById('ativo').checked = true;
            document.getElementById('img').value = "";
            btnDel.style.display = "none";
        } else {
            const imovel = imoveisMemoria.find(x => x.id == idSel);
            if (imovel) {
                document.getElementById('id').value = imovel.id;
                document.getElementById('tit').value = imovel.titulo;
                document.getElementById('val').value = imovel.preco;
                document.getElementById('desc').value = imovel.descricao;
                document.getElementById('ativo').checked = imovel.ativo;
                btnDel.style.display = "block";
            }
        }
    }

    async function salvar() {
        const msg = document.getElementById('msg');
        const fd = new FormData();
        
        fd.append('idImovel', document.getElementById('id').value);
        fd.append('titulo', document.getElementById('tit').value);
        fd.append('preco', document.getElementById('val').value);
        fd.append('descricao', document.getElementById('desc').value);
        fd.append('ativo', document.getElementById('ativo').checked);
        
        const file = document.getElementById('img').files[0];
        if(file) fd.append('arquivo', file);

        msg.style.display = 'block';
        msg.innerText = "Salvando no servidor...";
        msg.style.background = "#eee";
        msg.style.color = "#333";

        try {
            // Rota corrigida com /imoveis
            const res = await fetch(`${API_URL}/imoveis/salvar-imovel`, {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: fd
            });

            if(res.ok) {
                msg.innerText = "✅ Salvo com sucesso!";
                msg.style.background = "#d4edda";
                msg.style.color = "#155724";
                
                await atualizarLista();
            } else { 
                throw new Error(); 
            }
        } catch (e) {
            msg.innerText = "❌ Erro ao salvar (Verifique o servidor C#).";
            msg.style.background = "#f8d7da";
            msg.style.color = "#721c24";
        }
    }

    async function deletar() {
        const id = document.getElementById('id').value;
        if(id == "0") return;

        if(!confirm("⚠️ ATENÇÃO: Deseja apagar este imóvel para sempre?")) return;

        try {
            // Rota corrigida com /imoveis
            const res = await fetch(`${API_URL}/imoveis/deletar-imovel/${id}`, {
                method: 'DELETE',
                headers: { 'X-Api-Key': API_KEY }
            });
            
            if(res.ok) {
                alert("Imóvel excluído com sucesso!");
                window.location.reload(); 
            }
        } catch (e) { alert("Erro ao excluir."); }
    }

    // Inicializa a lista ao abrir a página
    atualizarLista();
</script>
</body>
</html>
