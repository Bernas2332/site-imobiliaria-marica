<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis - Maricá</title>
    <style>
        /* CONFIGURAÇÃO DO FUNDO PROFISSONAL (NOVO/ALTERADO) */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            /* Link para uma imagem de alta qualidade de casa moderna */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000');
            background-size: cover; /* Preenche toda a tela */
            background-position: center; /* Centraliza a imagem */
            background-repeat: no-repeat; /* Não repete */
            background-attachment: fixed; /* Efeito de fundo fixo ao rolar */
            min-height: 100vh;
        }

        /* AJUSTES DE CONTRASTE NOS ELEMENTOS (ALTERADO) */
        header { 
            text-align: center; 
            padding: 40px 20px; 
            background: rgba(44, 62, 80, 0.9); /* Fundo translúcido para ler o texto */
            color: white; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        header h1 { margin: 0; font-size: 2.5rem; }
        header p { margin: 10px 0 0; font-size: 1.1rem; opacity: 0.9; }
        
        /* Botão de Consulta em Destaque (MANTIDO) */
        .area-consulta { text-align: center; margin: 30px 0; }
        .btn-consulta { 
            background: #27ae60; /* Verde para destacar sobre o fundo escuro */
            color: white; 
            padding: 18px 30px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(39,174,96,0.3);
            font-size: 1.1rem;
        }
        .btn-consulta:hover { 
            background: #2ecc71; 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 20px rgba(39,174,96,0.5);
        }

        /* Barra de Filtros (ALTERADO - FUNDO TRANSLÚCIDO) */
        .filtros-container { 
            background: rgba(255, 255, 255, 0.95); /* Fundo branco levemente transparente */
            max-width: 900px; 
            margin: 0 auto 30px auto; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px); /* Efeito de desfoque no fundo */
        }
        .filtros-container input { padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; flex: 1; min-width: 220px; outline: none; transition: 0.3s; }
        .filtros-container input:focus { border-color: #2c3e50; box-shadow: 0 0 8px rgba(44,62,80,0.3); }
        .btn-limpar { padding: 14px 25px; background: #e74c3c; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-limpar:hover { background: #c0392b; transform: scale(1.05); }

        /* Inputs de número sem setas (MANTIDO) */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Cards (MANTIDO) */
        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; padding-bottom: 50px; }
        .card { background: white; width: 310px; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.15); border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 35px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .info { padding: 25px; }
        .titulo { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 12px; }
        .preco { font-size: 1.5rem; color: #27ae60; font-weight: bold; margin-bottom: 12px; }
        .desc { font-size: 0.95rem; color: #666; margin-bottom: 25px; line-height: 1.5; height: 45px; overflow: hidden; }
        .whatsapp { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        .whatsapp:hover { background: #20b858; }
        .msg-vazio { text-align: center; color: white; font-size: 1.4rem; width: 100%; margin-top: 40px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <p>Sua casa dos sonhos em Maricá está aqui</p>
</header>

<div class="area-consulta">
    <a href="https://wa.me/5521997177214?text=Olá! Gostaria de agendar uma consulta técnica ou avaliação de imóvel." 
       class="btn-consulta" target="_blank">
       🏠 Solicitar Consulta / Avaliação de Imóvel
    </a>
</div>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Buscar por bairro, tipo, detalhes..." oninput="aplicarFiltros()">
    <input type="number" id="buscaMin" placeholder="R$ Preço Mínimo" min="0" oninput="aplicarFiltros()">
    <input type="number" id="buscaMax" placeholder="R$ Preço Máximo" min="0" oninput="aplicarFiltros()">
    <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
</div>

<div class="grid" id="lista"></div>

<script>
    let imoveisGlobais = [];
    // Número real fornecido anteriormente
    const WHATSAPP_PADRAO = "5521997177214";

    async function carregarBanco() {
        const grid = document.getElementById('lista');
        try {
            // URL da sua API no Render (MANTIDA)
            const res = await fetch('https://api-imobiliaria-marica.onrender.com/imoveis');
            if (!res.ok) throw new Error("Erro na API");
            
            imoveisGlobais = await res.json(); 
            renderizarCards(imoveisGlobais);   
        } catch (e) {
            console.error(e);
            grid.innerHTML = `<p style="color:white; font-weight:bold; text-align:center; background:rgba(255,0,0,0.7); padding: 15px; border-radius: 8px;">Erro ao carregar dados. Verifique o servidor C#!</p>`;
        }
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('lista');
        
        if(lista.length === 0) {
            grid.innerHTML = "<div class='msg-vazio'>😕 Nenhum imóvel encontrado com estes filtros.</div>";
            return;
        }

        grid.innerHTML = lista.map(i => {
            // Formatação de moeda profissional (MANTIDA)
            const precoExibicao = i.preco 
                ? i.preco.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }) 
                : "Consulte o valor";

            return `
                <div class="card">
                    <img src="${i.fotos || 'https://via.placeholder.com/400x300?text=Sem+Foto'}" alt="Foto do Imóvel">
                    <div class="info">
                        <div class="titulo">${i.titulo}</div>
                        <div class="preco">${precoExibicao}</div>
                        <div class="desc">${i.descricao}</div>
                        <a href="https://wa.me/${WHATSAPP_PADRAO}?text=Olá! Gostaria de saber mais sobre o imóvel: ${i.titulo}" class="whatsapp" target="_blank">Falar no WhatsApp</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function aplicarFiltros() {
        const termoBusca = document.getElementById('buscaTexto').value.toLowerCase();
        const precoMin = parseFloat(document.getElementById('buscaMin').value) || 0;
        const precoMax = parseFloat(document.getElementById('buscaMax').value) || Infinity;

        const imoveisFiltrados = imoveisGlobais.filter(imovel => {
            const temTexto = (imovel.titulo && imovel.titulo.toLowerCase().includes(termoBusca)) || 
                             (imovel.descricao && imovel.descricao.toLowerCase().includes(termoBusca));
            
            const precoImovel = imovel.preco || 0;
            const taNoPreco = precoImovel >= precoMin && precoImovel <= precoMax;

            return temTexto && taNoPreco;
        });

        renderizarCards(imoveisFiltrados);
    }

    function limparFiltros() {
        document.getElementById('buscaTexto').value = "";
        document.getElementById('buscaMin').value = "";
        document.getElementById('buscaMax').value = "";
        renderizarCards(imoveisGlobais); 
    }

    // Inicializa a busca (MANTIDA)
    carregarBanco();
</script>
</body>
</html>
