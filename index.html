<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis | Maricá & Região</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* CABEÇALHO COMPACTO COM GLOW DOURADO */
        header { 
            text-align: center; 
            padding: 25px 20px; /* Reduzi o padding vertical do banner */
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.85), rgba(26, 37, 47, 0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 { 
            margin: 0; /* Remove a margem padrão que afasta o título */
            font-size: 2.6rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7), 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .logo-central {
            width: 160px; /* Ajuste leve no tamanho para harmonia */
            height: auto;
            margin: 10px 0; /* Espaçamento curto entre título e descrição */
            filter: drop-shadow(0px 0px 10px rgba(255, 215, 0, 0.5));
            transition: transform 0.3s ease;
        }

        header p { 
            margin: 0; /* Remove a margem padrão que afasta a descrição */
            font-size: 1.1rem; 
            opacity: 0.9; 
            font-style: italic;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* FILTROS SEM SETINHAS */
        .filtros-container { 
            background: rgba(255, 255, 255, 0.95); max-width: 900px; 
            margin: 0 auto 25px auto; padding: 20px; border-radius: 15px; 
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }
        
        .filtros-container input { 
            padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            flex: 1; min-width: 200px; outline: none; 
        }

        /* REMOVE SETINHAS DO PREÇO */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* GRID E CARDS */
        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .card { 
            background: white; width: 310px; border-radius: 18px; 
            overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            transition: 0.3s ease; border: none; position: relative;
        }
        .card:hover { transform: translateY(-8px); }

        .img-container { position: relative; width: 100%; height: 210px; overflow: hidden; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-container img.active { display: block; }
        
        .seta { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.5); color: white; border: none; 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            opacity: 0; transition: 0.3s; z-index: 10;
        }
        .card:hover .seta { opacity: 1; }
        .seta-prev { left: 10px; }
        .seta-next { right: 10px; }

        .info { padding: 20px; }
        .titulo { font-size: 1.2rem; font-weight: bold; color: #333; }
        .preco { font-size: 1.4rem; color: #27ae60; font-weight: bold; margin: 5px 0; }
        .desc { font-size: 0.9rem; color: #666; height: 40px; overflow: hidden; }
        .whatsapp { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <img src="logo.svg" alt="Logo Turíbio Imóveis" class="logo-central">
    <p>A chave para o seu novo lar está aqui</p>
</header>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Local ou detalhes..." oninput="aplicarFiltros()">
    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="aplicarFiltros()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="aplicarFiltros()">
</div>

<div class="grid" id="lista"></div>

<script>
    let imoveisGlobais = [];
    const API_URL = "https://api-imobiliaria-marica.onrender.com/imoveis";

    async function carregarBanco() {
        try {
            const res = await fetch(API_URL);
            imoveisGlobais = await res.json();
            renderizarCards(imoveisGlobais);
        } catch (e) {
            document.getElementById('lista').innerHTML = "<p style='color:white'>Erro ao carregar os imóveis.</p>";
        }
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('lista');
        grid.innerHTML = lista.map(i => {
            const fotosArr = i.fotos ? i.fotos.split(',') : ['https://via.placeholder.com/400x300'];
            const precoFormatado = i.preco ? i.preco.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }) : "Consulte";
            
            return `
                <div class="card">
                    <div class="img-container" id="img-container-${i.id}">
                        ${fotosArr.map((f, idx) => `<img src="${f}" class="${idx === 0 ? 'active' : ''}">`).join('')}
                        ${fotosArr.length > 1 ? `
                            <button class="seta seta-prev" onclick="mudarFoto(${i.id}, -1, event)">&#10094;</button>
                            <button class="seta seta-next" onclick="mudarFoto(${i.id}, 1, event)">&#10095;</button>
                        ` : ''}
                    </div>
                    <div class="info">
                        <div class="titulo">${i.titulo}</div>
                        <div class="preco">${precoFormatado}</div>
                        <div class="desc">${i.descricao}</div>
                        <a href="https://wa.me/5521997177214?text=Olá, vi o imóvel ${i.titulo} e gostaria de saber mais." class="whatsapp" target="_blank">WhatsApp</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function mudarFoto(idImovel, direcao, event) {
        event.stopPropagation();
        const container = document.getElementById(`img-container-${idImovel}`);
        const imagens = container.querySelectorAll('img');
        let atual = 0;
        imagens.forEach((img, index) => {
            if (img.classList.contains('active')) atual = index;
            img.classList.remove('active');
        });
        let proximo = (atual + direcao + imagens.length) % imagens.length;
        imagens[proximo].classList.add('active');
    }

    function aplicarFiltros() {
        const txt = document.getElementById('buscaTexto').value.toLowerCase();
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        const filtrados = imoveisGlobais.filter(i => {
            const match = i.titulo.toLowerCase().includes(txt) || i.descricao.toLowerCase().includes(txt);
            return match && i.preco >= min && i.preco <= max;
        });
        renderizarCards(filtrados);
    }

    carregarBanco();
</script>
</body>
</html>
