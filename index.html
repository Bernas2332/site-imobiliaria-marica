<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis | Maricá & Região</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #121212; 
            --card-bg: rgba(30, 30, 30, 0.95); 
            --text-gray: #B0B0B0;
            /* Fundo clareado: de 0.65 para 0.45 */
            --background-dim: rgba(0, 0, 0, 0.45); 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; 
            background: linear-gradient(var(--background-dim), var(--background-dim)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000') fixed center/cover;
            color: white;
            min-height: 100vh;
        }

        /* CABEÇALHO BLACK & GOLD */
        header { 
            text-align: center; padding: 30px; 
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-bottom: 3px solid var(--primary-yellow);
            border-radius: 15px; margin-bottom: 25px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { 
            font-size: 3rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; 
            color: var(--primary-yellow);
            margin: 0; line-height: 1;
            text-shadow: 2px 2px 0px rgba(0,0,0,1);
        }

        .logo-central { 
            width: 200px; margin: 15px 0; 
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
        }

        header p { color: var(--text-gray); font-style: italic; margin-top: -5px; letter-spacing: 1px; }

        /* BOTÃO DE CONSULTORIA COM WHATSAPP */
        .btn-consultoria {
            margin-top: 15px;
            padding: 12px 25px;
            border: 2px solid var(--primary-yellow);
            color: var(--primary-yellow);
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-consultoria:hover {
            background: var(--primary-yellow);
            color: black;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* FILTROS DARK */
        .filtros-container { 
            background: var(--card-bg); max-width: 950px; margin: 0 auto 30px; 
            padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .filtros-container input, .filtros-container select { 
            background: #2D2D2D; border: 1px solid #444; color: white;
            padding: 10px; border-radius: 8px; flex: 1; min-width: 150px; outline: none;
        }
        .filtros-container input::placeholder { color: #666; }
        .filtros-container input:focus, .filtros-container select:focus { border-color: var(--primary-yellow); }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* CARDS DARK MODE */
        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .card { 
            background: var(--card-bg); width: 310px; border-radius: 18px; 
            overflow: hidden; border: 1px solid #333; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-yellow); }

        /* BADGE VENDA/LOCAÇÃO */
        .tipo-badge {
            position: absolute; top: 12px; left: 12px; 
            padding: 4px 12px; border-radius: 6px; 
            font-size: 11px; font-weight: 900; z-index: 5;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .badge-venda { background: var(--primary-yellow); color: black; }
        .badge-locacao { background: #17a2b8; color: white; }

        .img-container { position: relative; height: 210px; background: #000; cursor: pointer; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: none; opacity: 0.85; transition: 0.3s; }
        .img-container img.active { display: block; }
        .card:hover .img-container img { opacity: 1; }

        .foto-badge { 
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); 
            color: var(--primary-yellow); padding: 3px 10px; border-radius: 6px; 
            font-size: 11px; font-weight: bold; border: 1px solid var(--primary-yellow); z-index: 5;
        }

        .dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 5; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .dot.active { background: var(--primary-yellow); transform: scale(1.3); }

        .seta-card { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.7); color: var(--primary-yellow); 
            border: 1px solid var(--primary-yellow); width: 32px; height: 32px; border-radius: 50%; 
            cursor: pointer; opacity: 0; transition: 0.3s; z-index: 10;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .card:hover .seta-card { opacity: 1; }
        .seta-card:hover { background: var(--primary-yellow); color: black; }
        .seta-prev { left: 8px; } .seta-next { right: 8px; }
        @media (max-width: 768px) { .seta-card { opacity: 0.8; } }

        .info { padding: 20px; text-align: left; }
        .titulo-card { color: white; font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
        .preco-card { color: var(--primary-yellow); font-size: 1.4rem; font-weight: 800; }
        .desc-card { color: var(--text-gray); font-size: 0.85rem; height: 40px; overflow: hidden; margin-top: 10px; }

        .btn-detalhes { 
            display: block; width: 100%; text-align: center; background: #333; 
            color: white; padding: 12px; border-radius: 10px; font-weight: bold; 
            margin-top: 15px; border: 1px solid #555; transition: 0.3s;
        }
        .btn-detalhes:hover { background: #444; color: var(--primary-yellow); border-color: var(--primary-yellow); }

        /* MODAL DE DETALHES */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        
        .modal-box {
            background: var(--card-bg); border: 1px solid var(--primary-yellow);
            border-radius: 15px; width: 95%; max-width: 900px; max-height: 90vh;
            overflow-y: auto; position: relative; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        
        .modal-close {
            position: absolute; top: 10px; right: 20px; font-size: 35px;
            color: var(--text-gray); background: none; border: none; cursor: pointer;
            z-index: 10; line-height: 1; transition: 0.2s;
        }
        .modal-close:hover { color: var(--primary-yellow); }

        .modal-grid { display: flex; flex-wrap: wrap; gap: 25px; }
        
        .modal-img-container { 
            flex: 1; min-width: 300px; position: relative; 
            border-radius: 10px; overflow: hidden; background: #000; 
            display: flex; align-items: center; justify-content: center;
        }
        .modal-img-container img { width: 100%; max-height: 400px; object-fit: contain; }
        
        .modal-info { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }
        .modal-info h2 { color: white; margin-top: 0; font-weight: bold; }
        .desc-card-full { color: var(--text-gray); margin-top: 15px; line-height: 1.6; white-space: pre-wrap; font-size: 0.95rem; }

        .whatsapp-btn { 
            display: block; text-align: center; background: var(--primary-yellow); 
            color: black; text-decoration: none; padding: 15px; border-radius: 10px; 
            font-weight: 900; margin-top: 20px; text-transform: uppercase;
            transition: 0.3s; border: none; font-size: 1.1rem;
        }
        .whatsapp-btn:hover { background: #e6c200; color: black; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        .modal-seta {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.8); color: var(--primary-yellow);
            border: 1px solid var(--primary-yellow); width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .modal-seta:hover { background: var(--primary-yellow); color: black; }
        .modal-seta.prev { left: 10px; }
        .modal-seta.next { right: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <img src="logo.svg" alt="Logo Turíbio" class="logo-central">
    <p>A CHAVE PARA O SEU NOVO LAR</p>
    
    <a href="https://wa.me/5521997177214?text=Olá, gostaria de agendar uma consultoria imobiliária." class="btn-consultoria" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
        </svg>
        Consultoria | (21) 99717-7214
    </a>
</header>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Local, bairro..." oninput="filtrar()">
    
    <select id="buscaTipo" onchange="filtrar()">
        <option value="todos">Todos os Tipos</option>
        <option value="venda">Comprar (Venda)</option>
        <option value="locacao">Alugar (Locação)</option>
    </select>

    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="filtrar()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="filtrar()">
</div>

<div class="grid" id="lista"></div>

<div id="modalDetalhes" class="modal-overlay" onclick="fecharModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="fecharModal()">&times;</button>
        <div id="modalConteudo"></div>
    </div>
</div>

<script>
    let imoveis = [];
    let modalFotoIndex = 0; 

    async function carregar() {
        try {
            const res = await fetch("https://api-imobiliaria-marica.onrender.com/imoveis");
            imoveis = await res.json();
            render(imoveis);
        } catch(e) { console.error(e); }
    }

    function render(lista) {
        document.getElementById('lista').innerHTML = lista.map(i => {
            const fotos = i.fotos ? i.fotos.split(',') : ['https://picsum.photos/seed/imovel/400/300'];
            
            // Lógica para definir Venda ou Locação (Fallback para 'venda' se a API não mandar)
            const tipoImovel = (i.tipo || 'venda').toLowerCase();
            const classeBadge = tipoImovel === 'locacao' ? 'badge-locacao' : 'badge-venda';
            const textoBadge = tipoImovel === 'locacao' ? 'LOCAÇÃO' : 'VENDA';

            return `
                <div class="card">
                    <div class="tipo-badge ${classeBadge}">${textoBadge}</div>

                    <div class="img-container" onclick="nextFotoClick(this, ${i.id}, event)">
                        <div class="foto-badge" id="badge-${i.id}">1 / ${fotos.length}</div>
                        ${fotos.map((f,idx) => `<img src="${f}" class="${idx===0?'active':''}" data-id="${i.id}">`).join('')}
                        
                        ${fotos.length > 1 ? `
                            <button class="seta-card seta-prev" onclick="mudarFotoSeta(this, -1, ${i.id}, event)">&#10094;</button>
                            <button class="seta-card seta-next" onclick="mudarFotoSeta(this, 1, ${i.id}, event)">&#10095;</button>
                        ` : ''}
                        
                        <div class="dots">${fotos.map((_,idx)=>`<div class="dot ${idx===0?'active':''}"></div>`).join('')}</div>
                    </div>
                    <div class="info">
                        <div class="titulo-card">${i.titulo}</div>
                        <div class="preco-card">R$ ${i.preco.toLocaleString('pt-br')} ${tipoImovel === 'locacao' ? '<span style="font-size:14px; color:#B0B0B0">/mês</span>' : ''}</div>
                        <div class="desc-card">${i.descricao}</div>
                        <button class="btn-detalhes" onclick="abrirModal(${i.id})">Ver Detalhes</button>
                    </div>
                </div>`;
        }).join('');
    }

    function mudarFotoSeta(btn, direcao, id, event) {
        event.stopPropagation();
        atualizarCarrossel(btn.closest('.img-container'), direcao, id);
    }
    function nextFotoClick(container, id, event) {
        atualizarCarrossel(container, 1, id);
    }
    function atualizarCarrossel(container, direcao, id) {
        const imgs = container.querySelectorAll('img');
        const dots = container.querySelectorAll('.dot');
        let idx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
        imgs[idx].classList.remove('active');
        if(dots[idx]) dots[idx].classList.remove('active');
        idx = (idx + direcao + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
        if(dots[idx]) dots[idx].classList.add('active');
        document.getElementById(`badge-${id}`).innerText = `${idx+1} / ${imgs.length}`;
    }

    function abrirModal(id) {
        const imovel = imoveis.find(i => i.id === id);
        const fotos = imovel.fotos ? imovel.fotos.split(',') : ['https://picsum.photos/seed/imovel/800/600'];
        modalFotoIndex = 0; 
        
        const tipoImovel = (imovel.tipo || 'venda').toLowerCase();

        const html = `
            <div class="modal-grid">
                <div class="modal-img-container">
                    <img id="modalImg" src="${fotos[0]}" alt="Foto do Imóvel">
                    ${fotos.length > 1 ? `
                        <button class="modal-seta prev" onclick="mudarFotoModal(-1, ${id})">&#10094;</button>
                        <button class="modal-seta next" onclick="mudarFotoModal(1, ${id})">&#10095;</button>
                    ` : ''}
                </div>
                <div class="modal-info">
                    <h2>${imovel.titulo}</h2>
                    <div class="preco-card">R$ ${imovel.preco.toLocaleString('pt-br')} ${tipoImovel === 'locacao' ? '<small>/mês</small>' : ''}</div>
                    <div class="desc-card-full">${imovel.descricao}</div>
                    <a href="https://wa.me/5521997177214?text=Olá, tenho interesse no imóvel: ${imovel.titulo}" class="whatsapp-btn" target="_blank">Enviar Mensagem pelo WhatsApp</a>
                </div>
            </div>
        `;
        
        document.getElementById('modalConteudo').innerHTML = html;
        document.getElementById('modalDetalhes').classList.add('active');
        document.body.style.overflow = 'hidden'; 
    }

    function mudarFotoModal(direcao, id) {
        const imovel = imoveis.find(i => i.id === id);
        const fotos = imovel.fotos ? imovel.fotos.split(',') : ['https://picsum.photos/seed/imovel/800/600'];
        modalFotoIndex = (modalFotoIndex + direcao + fotos.length) % fotos.length;
        document.getElementById('modalImg').src = fotos[modalFotoIndex];
    }

    function fecharModal(e) {
        if(e && e.target !== document.getElementById('modalDetalhes')) return;
        document.getElementById('modalDetalhes').classList.remove('active');
        document.body.style.overflow = 'auto'; 
    }

    function filtrar() {
        const t = document.getElementById('buscaTexto').value.toLowerCase();
        const tipoSelecionado = document.getElementById('buscaTipo').value;
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        
        render(imoveis.filter(i => {
            const tipoImovel = (i.tipo || 'venda').toLowerCase();
            const textoBate = i.titulo.toLowerCase().includes(t);
            const tipoBate = tipoSelecionado === 'todos' || tipoImovel === tipoSelecionado;
            const precoBate = i.preco >= min && i.preco <= max;
            
            return textoBate && tipoBate && precoBate;
        }));
    }

    carregar();
</script>
</body>
</html>
