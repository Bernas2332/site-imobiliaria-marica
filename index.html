<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis | Maricá & Região</title>

    <meta property="og:title" content="Turíbio Imóveis">
    <meta property="og:description" content="Encontre sua casa dos sonhos em Maricá e Nova Iguaçu.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1000">
    <meta property="og:url" content="https://turibioimoveis.vercel.app/"> 
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header { 
            text-align: center; 
            padding: 60px 20px; 
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.8), rgba(26, 37, 47, 0.9));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white; 
            border-radius: 16px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 { margin: 0; font-size: 2.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .area-consulta { text-align: center; margin: 30px 0; }
        .btn-consulta { 
            background: #25d366; color: white; padding: 16px 28px; 
            text-decoration: none; border-radius: 12px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .btn-consulta:hover { transform: translateY(-3px); background: #20b858; }
        .btn-consulta img { width: 25px; }

        .filtros-container { 
            background: rgba(255, 255, 255, 0.95); max-width: 900px; 
            margin: 0 auto 30px auto; padding: 25px; border-radius: 15px; 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }

        .filtros-container input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; flex: 1; min-width: 200px; outline: none; }
        
        /* REMOVE SETINHAS DO PREÇO */
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .btn-limpar { padding: 12px 20px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; }

        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .card { 
            background: white; width: 310px; border-radius: 18px; 
            overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            transition: 0.3s ease; border: none;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 35px rgba(0,0,0,0.3); cursor: pointer; }

        .img-container { position: relative; width: 100%; height: 210px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .badge-fotos { 
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; 
            border-radius: 6px; font-size: 0.75rem; font-weight: bold; 
        }

        .info { padding: 20px; }
        .titulo { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 8px; }
        .preco { font-size: 1.4rem; color: #27ae60; font-weight: bold; margin-bottom: 8px; }
        .desc { font-size: 0.9rem; color: #666; height: 40px; overflow: hidden; margin-bottom: 15px; }
        .whatsapp { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        
        .msg-vazio { text-align: center; color: white; width: 100%; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; }
        
        /* ESTILO DA GALERIA NO MODAL */
        #galeriaFotos img { width: 100%; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <p>A chave para o seu novo lar está aqui</p>
</header>

<div class="area-consulta">
    <a href="https://wa.me/5521997177214?text=Olá! Gostaria de uma avaliação técnica." class="btn-consulta" target="_blank">
       <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
       Solicitar Consulta / Avaliação
    </a>
</div>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Local ou detalhes..." oninput="aplicarFiltros()">
    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="aplicarFiltros()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="aplicarFiltros()">
    <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
</div>

<div class="grid" id="lista"></div>

<div class="modal fade" id="fotoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="modalTitulo"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="galeriaFotos"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let imoveisGlobais = [];
    const API_URL = "https://api-imobiliaria-marica.onrender.com/imoveis";
    const modal = new bootstrap.Modal(document.getElementById('fotoModal'));

    async function carregarBanco() {
        try {
            const res = await fetch(API_URL);
            imoveisGlobais = await res.json();
            renderizarCards(imoveisGlobais);
        } catch (e) {
            document.getElementById('lista').innerHTML = "<p class='msg-vazio'>Erro ao conectar com o servidor.</p>";
        }
    }

    function abrirGaleria(titulo, fotosStr) {
        document.getElementById('modalTitulo').innerText = titulo;
        const fotos = fotosStr.split(',');
        document.getElementById('galeriaFotos').innerHTML = fotos.map(f => `<img src="${f}">`).join('');
        modal.show();
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('lista');
        if(lista.length === 0) {
            grid.innerHTML = "<div class='msg-vazio'>😕 Nenhum imóvel encontrado.</div>";
            return;
        }

        grid.innerHTML = lista.map(i => {
            const fotosArr = i.fotos ? i.fotos.split(',') : ['https://via.placeholder.com/400x300'];
            const precoFormatado = i.preco ? i.preco.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }) : "Consulte";
            
            return `
                <div class="card" onclick="abrirGaleria('${i.titulo}', '${i.fotos}')">
                    <div class="img-container">
                        <img src="${fotosArr[0]}">
                        ${fotosArr.length > 1 ? `<div class="badge-fotos">+${fotosArr.length - 1} fotos</div>` : ''}
                    </div>
                    <div class="info">
                        <div class="titulo">${i.titulo}</div>
                        <div class="preco">${precoFormatado}</div>
                        <div class="desc">${i.descricao}</div>
                        <a href="https://wa.me/5521997177214?text=Interesse: ${i.titulo}" 
                           class="whatsapp" target="_blank" onclick="event.stopPropagation()">Falar no WhatsApp</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function aplicarFiltros() {
        const txt = document.getElementById('buscaTexto').value.toLowerCase();
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        const filtrados = imoveisGlobais.filter(i => {
            const match = i.titulo.toLowerCase().includes(txt) || i.descricao.toLowerCase().includes(txt);
            return match && i.preco >= min && i.preco <= max;
        });
        renderizarCards(filtrados);
    }

    function limparFiltros() {
        document.getElementById('buscaTexto').value = "";
        document.getElementById('buscaMin').value = "";
        document.getElementById('buscaMax').value = "";
        renderizarCards(imoveisGlobais);
    }

    carregarBanco();
</script>
</body>
</html>
