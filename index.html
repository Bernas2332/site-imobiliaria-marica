<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis | Maricá</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary-yellow: #FFD700;
            --dark-bg: #121212;
            --card-bg: #1E1E1E;
            --text-gray: #B0B0B0;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; 
            background: var(--dark-bg);
            color: white;
            min-height: 100vh;
        }

        /* CABEÇALHO BLACK & GOLD */
        header { 
            text-align: center; padding: 30px; 
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-bottom: 3px solid var(--primary-yellow);
            border-radius: 15px; margin-bottom: 25px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { 
            font-size: 3rem; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; 
            color: var(--primary-yellow);
            margin: 0; line-height: 1;
            text-shadow: 2px 2px 0px rgba(0,0,0,1);
        }

        .logo-central { 
            width: 200px; margin: 15px 0; 
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
        }

        header p { 
            color: var(--text-gray); font-style: italic; margin-top: -5px; 
            letter-spacing: 1px;
        }

        /* FILTROS DARK */
        .filtros-container { 
            background: var(--card-bg); max-width: 850px; margin: 0 auto 30px; 
            padding: 15px; border-radius: 12px; border: 1px solid #333;
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
        }

        .filtros-container input { 
            background: #2D2D2D; border: 1px solid #444; color: white;
            padding: 10px; border-radius: 8px; flex: 1; min-width: 160px; outline: none;
        }
        .filtros-container input::placeholder { color: #666; }
        .filtros-container input:focus { border-color: var(--primary-yellow); }

        /* REMOVE SETINHAS DO PREÇO */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* CARDS DARK MODE */
        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        
        .card { 
            background: var(--card-bg); width: 310px; border-radius: 18px; 
            overflow: hidden; border: 1px solid #333; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary-yellow); }

        .img-container { position: relative; height: 210px; background: #000; cursor: pointer; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: none; opacity: 0.85; transition: 0.3s; }
        .img-container img.active { display: block; }
        .card:hover .img-container img { opacity: 1; }

        .foto-badge { 
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); 
            color: var(--primary-yellow); padding: 3px 10px; border-radius: 6px; 
            font-size: 11px; font-weight: bold; border: 1px solid var(--primary-yellow);
        }

        .dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .dot.active { background: var(--primary-yellow); transform: scale(1.3); }

        /* CONTEÚDO DO CARD */
        .info { padding: 20px; text-align: left; }
        .titulo-card { color: white; font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
        .preco-card { color: var(--primary-yellow); font-size: 1.4rem; font-weight: 800; }
        .desc-card { color: var(--text-gray); font-size: 0.85rem; height: 40px; overflow: hidden; margin-top: 10px; }

        .whatsapp-btn { 
            display: block; text-align: center; background: var(--primary-yellow); 
            color: black; text-decoration: none; padding: 12px; border-radius: 10px; 
            font-weight: 800; margin-top: 15px; text-transform: uppercase;
            transition: 0.3s; border: none;
        }
        .whatsapp-btn:hover { background: #e6c200; color: black; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <img src="logo.svg" alt="Logo Turíbio" class="logo-central">
    <p>A CHAVE PARA O SEU NOVO LAR</p>
</header>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Local, bairro..." oninput="filtrar()">
    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="filtrar()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="filtrar()">
</div>

<div class="grid" id="lista"></div>

<script>
    let imoveis = [];
    async function carregar() {
        try {
            const res = await fetch("https://api-imobiliaria-marica.onrender.com/imoveis");
            imoveis = await res.json();
            render(imoveis);
        } catch(e) { console.error(e); }
    }

    function render(lista) {
        document.getElementById('lista').innerHTML = lista.map(i => {
            const fotos = i.fotos ? i.fotos.split(',') : ['https://picsum.photos/400/300'];
            return `
                <div class="card">
                    <div class="img-container" onclick="nextFoto(this, ${i.id})">
                        <div class="foto-badge" id="badge-${i.id}">1 / ${fotos.length}</div>
                        ${fotos.map((f,idx) => `<img src="${f}" class="${idx===0?'active':''}" data-id="${i.id}">`).join('')}
                        <div class="dots">${fotos.map((_,idx)=>`<div class="dot ${idx===0?'active':''}"></div>`).join('')}</div>
                    </div>
                    <div class="info">
                        <div class="titulo-card">${i.titulo}</div>
                        <div class="preco-card">R$ ${i.preco.toLocaleString('pt-br')}</div>
                        <div class="desc-card">${i.descricao}</div>
                        <a href="https://wa.me/5521997177214?text=Interesse no imóvel: ${i.titulo}" class="whatsapp-btn" target="_blank">Ver Detalhes</a>
                    </div>
                </div>`;
        }).join('');
    }

    function nextFoto(container, id) {
        const imgs = container.querySelectorAll('img');
        const dots = container.querySelectorAll('.dot');
        let idx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
        imgs[idx].classList.remove('active');
        dots[idx].classList.remove('active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('active');
        dots[idx].classList.add('active');
        document.getElementById(`badge-${id}`).innerText = `${idx+1} / ${imgs.length}`;
    }

    function filtrar() {
        const t = document.getElementById('buscaTexto').value.toLowerCase();
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        render(imoveis.filter(i => (i.titulo.toLowerCase().includes(t)) && i.preco >= min && i.preco <= max));
    }
    carregar();
</script>
</body>
</html>
