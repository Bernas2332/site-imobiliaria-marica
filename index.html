<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis - Maricá</title>

    <meta property="og:title" content="Turíbio Imóveis - Maricá">
    <meta property="og:description" content="Encontre sua casa dos sonhos ou agende uma avaliação profissional com quem entende de Maricá.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1000">
    <meta property="og:url" content="https://site-imobiliaria-marica.vercel.app/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#2c3e50">

    <style>
        /* CONFIGURAÇÃO DO FUNDO (MANTIDO) */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- O NOVO CABEÇALHO "GLASSMORPHISM" (O QUE MUDOU) --- */
        header { 
            text-align: center; 
            padding: 60px 20px; /* Aumentei o padding para dar mais ar */
            
            /* Gradiente suave e fundo translúcido */
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.8), rgba(26, 37, 47, 0.9));
            
            /* Efeito de Vidro Jateado (Blur) - Super moderno */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* Suporte para Safari */
            
            color: white; 
            border-radius: 16px; /* Bordas mais arredondadas */
            margin-bottom: 30px; 
            
            /* Sombra mais suave e espalhada */
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            
            /* Borda fina branca para o efeito de vidro */
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            transition: 0.3s;
        }
        
        header h1 { 
            margin: 0; 
            font-size: 2.8rem; /* Aumentei um pouco */
            font-weight: 800; /* Mais negrito */
            text-transform: uppercase; /* Tudo maiúsculo */
            letter-spacing: 2px; /* Espaçamento entre letras */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* Sombra no texto */
        }
        
        header p { 
            margin: 15px 0 0; 
            font-size: 1.2rem; 
            opacity: 0.8; 
            font-weight: 300; /* Mais leve */
            letter-spacing: 1px;
        }

        /* --- RESTO DO CÓDIGO (MANTIDO) --- */

        .area-consulta { text-align: center; margin: 30px 0; }
        .btn-consulta { 
            background: #25d366; 
            color: white; 
            padding: 16px 28px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37,211,102,0.3);
            font-size: 1.1rem;
        }
        .btn-consulta:hover { 
            background: #20b858; 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37,211,102,0.5);
        }
        .btn-consulta img { width: 25px; height: 25px; }

        .filtros-container { 
            background: rgba(255, 255, 255, 0.95);
            max-width: 900px; 
            margin: 0 auto 30px auto; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px);
        }
        .filtros-container input { padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; flex: 1; min-width: 220px; outline: none; }
        .btn-limpar { padding: 14px 25px; background: #e74c3c; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; padding-bottom: 50px; }
        .card { background: white; width: 310px; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.15); border: 1px solid #eee; transition: 0.3s; }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .info { padding: 25px; }
        .titulo { font-size: 1.3rem; font-weight: bold; color: #333; margin-bottom: 12px; }
        .preco { font-size: 1.5rem; color: #27ae60; font-weight: bold; margin-bottom: 12px; }
        .desc { font-size: 0.95rem; color: #666; margin-bottom: 25px; height: 45px; overflow: hidden; }
        .whatsapp { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: bold; }
        
        .msg-vazio { text-align: center; color: white; font-size: 1.4rem; width: 100%; margin-top: 40px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    <p>Sua casa dos sonhos em Maricá está aqui</p>
</header>

<div class="area-consulta">
    <a href="https://wa.me/5521997177214?text=Olá! Gostaria de agendar uma consulta técnica ou avaliação de imóvel." 
       class="btn-consulta" target="_blank">
       <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
       Solicitar Consulta / Avaliação
    </a>
</div>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Buscar bairro ou detalhes..." oninput="aplicarFiltros()">
    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="aplicarFiltros()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="aplicarFiltros()">
    <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
</div>

<div class="grid" id="lista"></div>

<script>
    let imoveisGlobais = [];
    const WHATSAPP_PADRAO = "5521997177214";

    async function carregarBanco() {
        const grid = document.getElementById('lista');
        try {
            const res = await fetch('https://api-imobiliaria-marica.onrender.com/imoveis');
            if (!res.ok) throw new Error();
            imoveisGlobais = await res.json(); 
            renderizarCards(imoveisGlobais);   
        } catch (e) {
            grid.innerHTML = `<p style="color:white; text-align:center; background:rgba(255,0,0,0.7); padding: 15px; border-radius: 8px;">Erro ao carregar dados.</p>`;
        }
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('lista');
        if(lista.length === 0) {
            grid.innerHTML = "<div class='msg-vazio'>😕 Nenhum imóvel encontrado.</div>";
            return;
        }
        grid.innerHTML = lista.map(i => `
            <div class="card">
                <img src="${i.fotos || 'https://via.placeholder.com/400x300?text=Sem+Foto'}" alt="Foto">
                <div class="info">
                    <div class="titulo">${i.titulo}</div>
                    <div class="preco">${i.preco ? i.preco.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }) : "Consulte"}</div>
                    <div class="desc">${i.descricao}</div>
                    <a href="https://wa.me/${WHATSAPP_PADRAO}?text=Olá! Gostaria de saber mais sobre: ${i.titulo}" class="whatsapp" target="_blank">Falar no WhatsApp</a>
                </div>
            </div>
        `).join('');
    }

    function aplicarFiltros() {
        const termo = document.getElementById('buscaTexto').value.toLowerCase();
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        const filtrados = imoveisGlobais.filter(imovel => {
            const texto = (imovel.titulo + imovel.descricao).toLowerCase().includes(termo);
            const preco = (imovel.preco || 0) >= min && (imovel.preco || 0) <= max;
            return texto && preco;
        });
        renderizarCards(filtrados);
    }

    function limparFiltros() {
        document.getElementById('buscaTexto').value = "";
        document.getElementById('buscaMin').value = "";
        document.getElementById('buscaMax').value = "";
        renderizarCards(imoveisGlobais); 
    }

    carregarBanco();
</script>
</body>
</html>
