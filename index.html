<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíbio Imóveis | Maricá & Região</title>

    <meta property="og:title" content="Turíbio Imóveis">
    <meta property="og:description" content="Encontre sua casa dos sonhos em Maricá e Nova Iguaçu.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1000">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* CABEÇALHO PREMIUM */
        header { 
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, rgba(44, 62, 80, 0.85), rgba(26, 37, 47, 0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        /* ESTILO DO LOGO CENTRALIZADO */
        .logo-central {
            width: 180px; /* Aumentei para não ficar pequeno */
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0px 0px 12px rgba(255, 215, 0, 0.4)); /* Brilho dourado */
            transition: transform 0.3s ease;
        }
        .logo-central:hover {
            transform: scale(1.08);
        }

        header p { 
            font-size: 1.1rem; 
            margin: 0; 
            opacity: 0.9; 
            font-style: italic;
        }

        /* BOTÃO CONSULTA */
        .area-consulta { text-align: center; margin: 30px 0; }
        .btn-consulta { 
            background: #25d366; color: white; padding: 16px 28px; 
            text-decoration: none; border-radius: 12px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .btn-consulta:hover { transform: translateY(-3px); background: #20b858; color: white; }
        .btn-consulta img { width: 25px; }

        /* FILTROS */
        .filtros-container { 
            background: rgba(255, 255, 255, 0.95); max-width: 900px; 
            margin: 0 auto 30px auto; padding: 25px; border-radius: 15px; 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        .filtros-container input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; flex: 1; min-width: 200px; outline: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* GRID E CARDS */
        .grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .card { 
            background: white; width: 310px; border-radius: 18px; 
            overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            transition: 0.3s ease; border: none; position: relative;
        }
        .card:hover { transform: translateY(-8px); cursor: pointer; }

        /* CARROSSEL NO CARD */
        .img-container { position: relative; width: 100%; height: 210px; overflow: hidden; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-container img.active { display: block; }
        
        .seta { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            background: rgba(0,0,0,0.5); color: white; border: none; 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            opacity: 0; transition: 0.3s; z-index: 10;
        }
        .card:hover .seta { opacity: 1; }
        .seta-prev { left: 10px; }
        .seta-next { right: 10px; }

        .badge-fotos { 
            position: absolute; bottom: 10px; right: 10px; 
            background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; 
            border-radius: 6px; font-size: 0.75rem;
        }

        .info { padding: 20px; }
        .titulo { font-size: 1.2rem; font-weight: bold; color: #333; }
        .preco { font-size: 1.4rem; color: #27ae60; font-weight: bold; margin: 5px 0; }
        .desc { font-size: 0.9rem; color: #666; height: 40px; overflow: hidden; }
        .whatsapp { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Turíbio Imóveis</h1>
    
    <img src="logo.svg" alt="Logo Turíbio Imóveis" class="logo-central">
    
    <p>A chave para o seu novo lar está aqui</p>
</header>

<div class="area-consulta">
    <a href="https://wa.me/5521997177214?text=Olá! Gostaria de uma avaliação técnica." class="btn-consulta" target="_blank">
       <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
       Solicitar Consulta / Avaliação
    </a>
</div>

<div class="filtros-container">
    <input type="text" id="buscaTexto" placeholder="🔍 Local ou detalhes..." oninput="aplicarFiltros()">
    <input type="number" id="buscaMin" placeholder="R$ Mínimo" oninput="aplicarFiltros()">
    <input type="number" id="buscaMax" placeholder="R$ Máximo" oninput="aplicarFiltros()">
</div>

<div class="grid" id="lista"></div>

<script>
    let imoveisGlobais = [];
    const API_URL = "https://api-imobiliaria-marica.onrender.com/imoveis";

    async function carregarBanco() {
        try {
            const res = await fetch(API_URL);
            imoveisGlobais = await res.json();
            renderizarCards(imoveisGlobais);
        } catch (e) {
            document.getElementById('lista').innerHTML = "<p style='color:white'>Erro ao conectar com o servidor.</p>";
        }
    }

    function mudarFoto(idImovel, direcao, event) {
        event.stopPropagation(); // Não abre o link do zap ao clicar na seta
        const container = document.getElementById(`img-container-${idImovel}`);
        const imagens = container.querySelectorAll('img');
        let atual = 0;

        imagens.forEach((img, index) => {
            if (img.classList.contains('active')) atual = index;
            img.classList.remove('active');
        });

        let proximo = atual + direcao;
        if (proximo >= imagens.length) proximo = 0;
        if (proximo < 0) proximo = imagens.length - 1;

        imagens[proximo].classList.add('active');
    }

    function renderizarCards(lista) {
        const grid = document.getElementById('lista');
        grid.innerHTML = lista.map(i => {
            const fotosArr = i.fotos ? i.fotos.split(',') : ['https://via.placeholder.com/400x300'];
            const precoFormatado = i.preco ? i.preco.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' }) : "Consulte";
            
            return `
                <div class="card">
                    <div class="img-container" id="img-container-${i.id}">
                        ${fotosArr.map((f, idx) => `<img src="${f}" class="${idx === 0 ? 'active' : ''}">`).join('')}
                        ${fotosArr.length > 1 ? `
                            <button class="seta seta-prev" onclick="mudarFoto(${i.id}, -1, event)">&#10094;</button>
                            <button class="seta seta-next" onclick="mudarFoto(${i.id}, 1, event)">&#10095;</button>
                            <div class="badge-fotos">${fotosArr.length} fotos</div>
                        ` : ''}
                    </div>
                    <div class="info">
                        <div class="titulo">${i.titulo}</div>
                        <div class="preco">${precoFormatado}</div>
                        <div class="desc">${i.descricao}</div>
                        <a href="https://wa.me/5521997177214?text=Interesse: ${i.titulo}" 
                           class="whatsapp" target="_blank">Falar no WhatsApp</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function aplicarFiltros() {
        const txt = document.getElementById('buscaTexto').value.toLowerCase();
        const min = parseFloat(document.getElementById('buscaMin').value) || 0;
        const max = parseFloat(document.getElementById('buscaMax').value) || Infinity;
        const filtrados = imoveisGlobais.filter(i => {
            const match = i.titulo.toLowerCase().includes(txt) || i.descricao.toLowerCase().includes(txt);
            return match && i.preco >= min && i.preco <= max;
        });
        renderizarCards(filtrados);
    }

    carregarBanco();
</script>
</body>
</html>
